<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tranzakciók</title>
</head>
<body>
  <h1>Tranzakciók feladat</h1>
  <div>
    <label for="tranzakciok">Tranzakicók file:</label>
    <input name="tranzakciok" id="tranzakciok" type="file" accept=".csv">
  </div>
  <div>
    <button disabled id="sendFile">File beküldése</button>
    <button disabled id="exportSql">Export SQL</button>
    <button disabled id="exportHtml">Hibalista, egyenleg (HTML)</button>
  </div>
</body>
<script src="script.js"></script>
</html>
