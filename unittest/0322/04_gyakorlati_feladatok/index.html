<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Gyakorlati feladatok - Unit Test (QUnit)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.20.0.css">
</head>
<body>

    <div id="qunit-fixture">
        <div class="container mt-5" id="login-container">
            <h2 class="text-center mb-4 text-primary" id="login-title">Bejelentkezés</h2>
            <form id="login-form" class="border p-4 shadow rounded bg-light">
                <div class="mb-3 form-group">
                    <label for="usernameInput" class="form-label fw-bold">Felhasználónév</label>
                    <input type="text" class="form-control" id="usernameInput" placeholder="Kérjük, adja meg a felhasználónevét" required>
                </div>
                <div class="mb-3 form-group">
                    <label for="passwordInput" class="form-label fw-bold">Jelszó</label>
                    <input type="password" class="form-control" id="passwordInput" placeholder="Kérjük, adja meg a jelszavát" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="login-button">Belépés</button>
            </form>
        </div>
    </div>

    <div id="qunit"></div>

    <script src="https://code.jquery.com/qunit/qunit-2.20.0.js"></script>
    <script src="app.js"></script>
    <script src="test.js"></script>
</body>
</html>
